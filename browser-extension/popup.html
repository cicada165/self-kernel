<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Kernel - Quick Capture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 500px;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .header-icon {
            font-size: 24px;
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-title p {
            font-size: 12px;
            color: #888;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .status.connected {
            border-left: 3px solid #00ff88;
        }

        .status.disconnected {
            border-left: 3px solid #ff4444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #aaa;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            padding: 10px;
            font-family: inherit;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #00ff88;
        }

        .tags-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            min-height: 40px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: #00ff8822;
            border: 1px solid #00ff88;
            border-radius: 4px;
            font-size: 12px;
            color: #00ff88;
        }

        .tag-remove {
            cursor: pointer;
            font-weight: bold;
        }

        .tags-input {
            flex: 1;
            min-width: 100px;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #00ff88;
            color: #000;
        }

        .btn-primary:hover {
            background: #00dd77;
        }

        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .recent-captures {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .recent-captures h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #aaa;
        }

        .capture-item {
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .capture-item-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .capture-item-time {
            font-size: 11px;
            color: #888;
        }

        .error-message {
            padding: 10px;
            background: #ff444422;
            border: 1px solid #ff4444;
            border-radius: 6px;
            color: #ff4444;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .success-message {
            padding: 10px;
            background: #00ff8822;
            border: 1px solid #00ff88;
            border-radius: 6px;
            color: #00ff88;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🧠</div>
        <div class="header-title">
            <h1>Self Kernel</h1>
            <p>Quick Thought Capture</p>
        </div>
    </div>

    <div id="status" class="status disconnected">
        <span id="status-icon">⚠️</span>
        <span id="status-text">Connecting...</span>
    </div>

    <div id="message-container"></div>

    <form id="capture-form">
        <div class="form-group">
            <label class="form-label">Thought or Idea</label>
            <textarea id="thought-input" class="form-textarea" placeholder="What's on your mind?" autofocus></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Priority</label>
            <select id="priority-select" class="form-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Tags (press Enter to add)</label>
            <div id="tags-container" class="tags-input-container">
                <input type="text" id="tags-input" class="tags-input" placeholder="Add tags...">
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">💾 Capture</button>
            <button type="button" id="clear-btn" class="btn btn-secondary">Clear</button>
        </div>
    </form>

    <div class="recent-captures">
        <h3>Recent Captures</h3>
        <div id="recent-list"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
